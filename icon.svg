<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#F0EBE5"/>

  <!-- Subtle inner border -->
  <rect x="2" y="2" width="124" height="124" rx="20" fill="none" stroke="#C15F3C" stroke-width="2" stroke-opacity="0.3"/>

  <!-- C letter -->
  <text
    x="22"
    y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82"
    font-weight="700"
    fill="#C15F3C"
    letter-spacing="-4"
  >C</text>

  <!-- B letter — slightly offset for stylized overlap -->
  <text
    x="62"
    y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82"
    font-weight="700"
    fill="#2C2420"
    letter-spacing="-4"
  >B</text>

  <!-- Underline accent -->
  <rect x="18" y="98" width="92" height="4" rx="2" fill="#C15F3C"/>
</svg>
